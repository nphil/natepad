name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ios-build
  cancel-in-progress: false

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    env:
      SCHEME: Natepad
      PROJECT: Natepad.xcodeproj
      ARCHIVE_PATH: build/Natepad.xcarchive

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for tag inspection

      # ── Versioning ──────────────────────────────────────────────────────────

      - name: Determine next version
        id: semver
        run: |
          # Most recent vX.Y[.Z] tag, or bootstrap at v0.0.0
          LAST_TAG=$(git tag --list 'v*' --sort=-version:refname \
                       | grep -E '^v[0-9]' | head -1)
          [ -z "$LAST_TAG" ] && LAST_TAG="v0.0.0"

          # Normalise to X.Y.Z  (handle two-part tags like v2.1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
          PATCH="${PATCH:-0}"

          # Commits since last tag
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          echo "Last tag : $LAST_TAG (${MAJOR}.${MINOR}.${PATCH})"
          echo "Commits  :"
          echo "$COMMITS"

          # Walk commits; highest wins: major > minor > patch > none
          # chore/docs/style/ci/test/build commits are skipped (no bump)
          BUMP="none"
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if echo "$msg" | grep -qiE '(BREAKING[ -]CHANGE|^feat[^:]*!:|^fix[^:]*!:)'; then
              BUMP="major"; break
            elif echo "$msg" | grep -qE '^feat(\([^)]*\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$msg" | grep -qE '^(fix|perf|refactor)(\([^)]*\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            elif ! echo "$msg" | grep -qE '^(chore|docs|style|ci|test|build)(\([^)]*\))?:'; then
              # Free-form commit (not a known skip prefix) → treat as patch
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          echo "Bump: $BUMP"

          if   [ "$BUMP" = "major" ]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then MINOR=$((MINOR+1)); PATCH=0
          elif [ "$BUMP" = "patch" ]; then PATCH=$((PATCH+1)); fi

          NEW_VER="${MAJOR}.${MINOR}.${PATCH}"
          [ "$BUMP" != "none" ] && NEW_TAG="v${NEW_VER}" || NEW_TAG=""

          # Monotonically-increasing build number from commit count
          BUILD_NUM=$(git rev-list --count HEAD)

          echo "bump=${BUMP}"           >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VER}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}"     >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}"   >> "$GITHUB_OUTPUT"
          echo "build_num=${BUILD_NUM}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into project.yml
        run: |
          VER="${{ steps.semver.outputs.new_version }}"
          BUILD="${{ steps.semver.outputs.build_num }}"
          sed -i '' "s/CFBundleShortVersionString:.*/CFBundleShortVersionString: \"${VER}\"/" project.yml
          sed -i '' "s/CFBundleVersion:.*/CFBundleVersion: \"${BUILD}\"/" project.yml
          echo "Stamped version=${VER} build=${BUILD}"

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO \
            INSTALL_PATH="/Applications" \
            | xcpretty || exit ${PIPESTATUS[0]}

      - name: Package into IPA
        run: |
          APP_PATH=$(find "$ARCHIVE_PATH" \
            -name "*.app" \
            ! -name "*.xctest" \
            ! -path "*/SwiftSupport/*" \
            2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found in archive. Listing archive contents:"
            find "$ARCHIVE_PATH" -maxdepth 6 2>/dev/null || echo "(archive missing entirely)"
            exit 1
          fi

          echo "✅ Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Natepad.ipa Payload/
          echo "IPA size: $(du -sh Natepad.ipa | cut -f1)"

      - name: Package web app
        run: |
          cd web
          zip -r ../Natepad-Web.zip .
          cd ..
          echo "Web zip size: $(du -sh Natepad-Web.zip | cut -f1)"

      - name: Deploy to GitHub Pages
        run: |
          cd web
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy NatePad Web to GitHub Pages [skip ci]"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages

      # ── Publish ──────────────────────────────────────────────────────────────

      - name: Tag and publish versioned release
        if: steps.semver.outputs.new_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG:  ${{ steps.semver.outputs.new_tag }}
          NEW_VER:  ${{ steps.semver.outputs.new_version }}
          LAST_TAG: ${{ steps.semver.outputs.last_tag }}
        run: |
          # Build changelog (exclude infra-only commits)
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" \
              | grep -vE '^- (chore|docs|style|ci|test|build)(\([^)]*\))?:' \
              | head -20 || true)
          fi
          [ -z "${CHANGELOG:-}" ] && CHANGELOG="- Various improvements"

          # Write release notes in bash (avoids unindented Python body breaking YAML block scalar)
          {
            echo "## What's new in ${NEW_VER}"
            echo ""
            echo "${CHANGELOG}"
            echo ""
            echo "---"
            echo "Unsigned IPA — sideload with AltStore or Feather."
          } > /tmp/release-notes.md
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            Natepad.ipa \
            Natepad-Web.zip \
            --title "$NEW_TAG" \
            --notes-file /tmp/release-notes.md

      # Releases created with GITHUB_TOKEN do NOT fire `release: published`
      # events (GitHub anti-recursion rule), so a separate event-triggered
      # workflow can never keep apps.json in sync. Update it right here instead.
      # The Python heredoc body stays at the block-scalar indentation level —
      # never put heredoc content at column 0 inside `run: |` (breaks YAML).
      - name: Update Feather repo (apps.json)
        if: steps.semver.outputs.new_tag != ''
        env:
          NEW_VER: ${{ steps.semver.outputs.new_version }}
          NEW_TAG: ${{ steps.semver.outputs.new_tag }}
        run: |
          # The job checkout is pinned to the trigger SHA, but a previous run's
          # apps.json commit may have landed on main since — rebasing the stale
          # checkout conflicts (broke run #58). Instead, apply the edit on top
          # of the live main tip in a scratch worktree and retry if main moves.
          IPA_SIZE=$(stat -f%z Natepad.ipa)
          export IPA_SIZE
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git worktree add --detach /tmp/apps-sync origin/main
          cd /tmp/apps-sync

          ok=0
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            python3 - "$NEW_VER" "$NEW_TAG" << 'PYEOF'
          import json, sys, os, datetime

          version, tag = sys.argv[1], sys.argv[2]
          repo = os.environ.get("GITHUB_REPOSITORY", "nphil/natepad")
          with open("/tmp/release-notes.md") as f:
              body = f.read()

          with open("apps.json") as f:
              data = json.load(f)

          app = data["apps"][0]
          if any(v["version"] == version for v in app["versions"]):
              print(f"{version} already present in apps.json")
              sys.exit(0)

          app["versions"].insert(0, {
              "version": version,
              "buildVersion": version,
              "date": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "localizedDescription": body,
              "downloadURL": f"https://github.com/{repo}/releases/download/{tag}/Natepad.ipa",
              "size": int(os.environ["IPA_SIZE"]),
          })

          with open("apps.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          print(f"apps.json updated for {version}")
          PYEOF
            git add apps.json
            if git diff --cached --quiet; then
              echo "apps.json already up to date"
              ok=1; break
            fi
            git commit -m "chore: update apps.json for ${NEW_TAG} [skip ci]"
            if git push origin HEAD:main; then
              ok=1; break
            fi
            echo "Push rejected (main moved during attempt ${attempt}) — retrying"
          done
          [ "$ok" = "1" ] || { echo "Failed to update apps.json after 3 attempts"; exit 1; }

      - name: Delete previous "latest" prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Publish "latest" prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VER_LABEL="${{ steps.semver.outputs.new_tag }}"
          [ -z "$VER_LABEL" ] && VER_LABEL="${{ steps.semver.outputs.new_version }}"
          gh release create "latest" \
            Natepad.ipa \
            Natepad-Web.zip \
            --title "Latest build (${VER_LABEL})" \
            --notes "Unsigned IPA — sideload with AltStore. Built from \`$SHORT_SHA\` on $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --prerelease
