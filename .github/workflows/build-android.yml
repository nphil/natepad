name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             "NatePad-android-${SHORT_SHA}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: natepad-android-debug
          path: NatePad-android-*.apk
          retention-days: 30

      - name: Delete previous android-latest prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete android-latest --yes --cleanup-tag 2>/dev/null || true

      - name: Publish android-latest prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          gh release create "android-latest" \
            NatePad-android-*.apk \
            --title "Android latest (debug)" \
            --notes "Debug APK — install with 'Allow unknown sources' enabled. Built from \`${SHORT_SHA}\` on $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --prerelease
