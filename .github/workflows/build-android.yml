name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-build
  cancel-in-progress: false

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for version computation

      # Same semver logic as build.yml so the APK carries the same version
      # number as the IPA built from this push.
      - name: Determine version
        id: semver
        run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-version:refname \
                       | grep -E '^v[0-9]' | head -1)
          [ -z "$LAST_TAG" ] && LAST_TAG="v0.0.0"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
          PATCH="${PATCH:-0}"

          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          BUMP="none"
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if echo "$msg" | grep -qiE '(BREAKING[ -]CHANGE|^feat[^:]*!:|^fix[^:]*!:)'; then
              BUMP="major"; break
            elif echo "$msg" | grep -qE '^feat(\([^)]*\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$msg" | grep -qE '^(fix|perf|refactor)(\([^)]*\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            elif ! echo "$msg" | grep -qE '^(chore|docs|style|ci|test|build)(\([^)]*\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          if   [ "$BUMP" = "major" ]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then MINOR=$((MINOR+1)); PATCH=0
          elif [ "$BUMP" = "patch" ]; then PATCH=$((PATCH+1)); fi

          NEW_VER="${MAJOR}.${MINOR}.${PATCH}"
          [ "$BUMP" != "none" ] && NEW_TAG="v${NEW_VER}" || NEW_TAG=""
          BUILD_NUM=$(git rev-list --count HEAD)

          echo "Version: ${NEW_VER}  (bump=${BUMP}, code=${BUILD_NUM})"
          echo "new_version=${NEW_VER}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}"     >> "$GITHUB_OUTPUT"
          echo "build_num=${BUILD_NUM}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build signed release APK
        working-directory: android
        run: |
          gradle assembleRelease \
            -PversionCode=${{ steps.semver.outputs.build_num }} \
            -PversionName=${{ steps.semver.outputs.new_version }}

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk NatePad-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: natepad-android
          path: NatePad-android.apk
          retention-days: 30

      - name: Refresh android-latest prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          gh release delete android-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create "android-latest" \
            NatePad-android.apk \
            --title "Android latest (v${{ steps.semver.outputs.new_version }})" \
            --notes "Signed release APK. Built from \`${SHORT_SHA}\` on $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --prerelease

      # The versioned vX.Y.Z release is created by the iOS workflow (build.yml),
      # which takes ~15 min. Wait for it, then attach the APK so Obtainium can
      # track versioned releases with a single .apk asset.
      - name: Attach APK to versioned release
        if: steps.semver.outputs.new_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.semver.outputs.new_tag }}
        run: |
          echo "Waiting for release ${NEW_TAG} (created by the IPA workflow)…"
          for i in $(seq 1 60); do
            if gh release view "$NEW_TAG" >/dev/null 2>&1; then
              gh release upload "$NEW_TAG" NatePad-android.apk --clobber
              echo "APK attached to ${NEW_TAG}"
              exit 0
            fi
            sleep 30
          done
          echo "Release ${NEW_TAG} never appeared (iOS build failed?)"
          exit 1
