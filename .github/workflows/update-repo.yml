name: Update Feather repo

# Fires on every published release — both versioned (v2.1) and the rolling
# "latest" prerelease created by every push to main.
#
# Versioned releases: inserted as a new entry at the top of apps.json.
# Rolling "latest" prerelease: gets a date-based version (e.g. 2026.05.25)
# and replaces the previous rolling entry so history stays clean.
on:
  release:
    types: [published]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch apps.json
        env:
          TAG_NAME:     ${{ github.event.release.tag_name }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
          RELEASE_BODY: ${{ github.event.release.body }}
          PRERELEASE:   ${{ github.event.release.prerelease }}
          ASSETS_JSON:  ${{ toJson(github.event.release.assets) }}
        run: |
          python3 - << 'PYEOF'
          import json, os, re

          tag        = os.environ['TAG_NAME']
          date       = os.environ['PUBLISHED_AT']
          body       = os.environ.get('RELEASE_BODY', '')
          assets     = json.loads(os.environ['ASSETS_JSON'])
          prerelease = os.environ.get('PRERELEASE', 'false').lower() == 'true'

          ipa = next((a for a in assets if a['name'].endswith('.ipa')), None)
          if not ipa:
              print("No IPA found in release assets"); exit(1)

          url  = ipa['browser_download_url']
          size = ipa['size']

          with open('apps.json') as f:
              data = json.load(f)

          app = data['apps'][0]

          if prerelease or tag == 'latest':
              # Rolling build — use a date-based version and replace the
              # previous rolling entry (identified by a 4-digit year prefix)
              # so the version list doesn't grow on every push to main.
              ver_str = date[:10].replace('-', '.')  # e.g. "2026.05.25"
              new_ver = {
                  "version": ver_str,
                  "buildVersion": ver_str,
                  "date": date,
                  "localizedDescription": body,
                  "downloadURL": url,
                  "size": size
              }
              if app['versions'] and re.match(r'^20\d\d\.', app['versions'][0]['version']):
                  app['versions'][0] = new_ver   # overwrite previous rolling entry
              else:
                  app['versions'].insert(0, new_ver)
          else:
              # Versioned release (v2.x, v3.x, …) — insert at front
              version = tag.lstrip('v')
              new_ver = {
                  "version": version,
                  "buildVersion": version,
                  "date": date,
                  "localizedDescription": body,
                  "downloadURL": url,
                  "size": size
              }
              app['versions'].insert(0, new_ver)

          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          print(f"apps.json patched for {tag}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: update apps.json for ${{ github.event.release.tag_name }} [skip ci]"
          git push
